<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RCP Asistente Virtual</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e63946">
</head>
<body>
    <div class="app-container">
        <!-- Área del Bot / Personaje -->
        <div class="character-area">
            <div id="avatar" class="avatar doctor">🩺</div>
            <div class="speech-bubble">
                <p id="step-text">¡Hola! Soy el Dr. López. Selecciona el tipo de RCP para empezar.</p>
            </div>
        </div>

        <!-- Selector de Personaje -->
        <div class="character-selector">
            <button class="char-btn selected" data-char="doctor">🩺 Dr. López</button>
            <button class="char-btn" data-char="panda">🐼 Panda RCP</button>
        </div>

        <!-- Selector de Tipo de RCP -->
        <div class="type-selector">
            <button class="type-btn selected" data-type="adulto">🧑 Adulto</button>
            <button class="type-btn" data-type="niño">👦 Niño</button>
            <button class="type-btn" data-type="bebe">👶 Bebé</button>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button id="start-btn" class="btn btn-primary">▶ Iniciar Guía</button>
            <button id="next-btn" class="btn btn-primary" disabled>⏭ Siguiente Paso</button>
            <button id="voice-btn" class="btn btn-secondary">🔇 Voz: Apagada</button>
        </div>

        <!-- Metrónomo (Oculto por defecto) -->
        <div id="metronome-box" class="metronome-box" style="display: none;">
            <p style="font-weight: bold; margin-bottom: 8px;">🔊 Ritmo 100-120 ppm</p>
            <button id="metro-start" class="metro-btn">▶ Iniciar Metrónomo</button>
            <button id="metro-stop" class="metro-btn" disabled>⏹ Parar</button>
        </div>

        <!-- Emergencia -->
        <a href="tel:107" class="btn btn-emergency">📞 Llamar al 107 (Emergencias)</a>

        <p class="disclaimer">
            Guía de auxilio. No reemplaza la formación profesional. Ante una emergencia real, llama al 107 o 911.
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
