<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RCP para todos 🐣🐼🐶</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffaaa5">
</head>
<body>
    <div class="app-container">
        <!-- Personaje y bocadillo -->
        <div class="character-area">
            <div id="character-avatar" class="character-avatar">🐼</div>
            <div id="speech-bubble" class="speech-bubble">
                <p id="bubble-text">¡Hola! Soy Pandi. Elegí abajo a quién vas a ayudar.</p>
            </div>
        </div>

        <!-- Selector de tipo de RCP -->
        <div class="type-selector">
            <button class="type-btn" data-type="adulto">🐶 Adulto</button>
            <button class="type-btn selected" data-type="niño">🐼 Niño</button>
            <button class="type-btn" data-type="bebe">🐣 Bebé</button>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button id="start-btn" class="btn btn-start">▶ Iniciar Guía</button>
            <button id="next-btn" class="btn btn-next" disabled>⏭ Siguiente</button>
            <button id="voice-btn" class="btn btn-voice">🔊 Voz: Activada</button>
        </div>

        <!-- Metrónomo -->
        <div id="metronome-box" class="metronome-box" style="display: none;">
            <p>🥁 Ritmo de compresiones</p>
            <button id="metro-start" class="metro-btn">▶ Iniciar</button>
            <button id="metro-stop" class="metro-btn" disabled>⏹ Parar</button>
        </div>

        <!-- Emergencia -->
        <a href="tel:107" class="btn btn-emergency">📞 Llamar al 107</a>

        <p class="disclaimer">
            Guía de auxilio. No reemplaza la formación profesional.
        </p>
    </div>

    <script src="app.js"></script>
</body>
</html>
