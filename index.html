<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RCP Companion ✨</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Área del avatar -->
        <div class="avatar-area">
            <div id="avatar-container" class="avatar-container">
                <!-- Avatar CSS del médico chibi -->
                <div id="chibi-medic" class="chibi-medic">
                    <div class="chibi-body">
                        <div class="chibi-head">
                            <div class="chibi-hair"></div>
                            <div class="chibi-face">
                                <div class="chibi-eyes">
                                    <div class="chibi-eye left"><div class="pupil"></div></div>
                                    <div class="chibi-eye right"><div class="pupil"></div></div>
                                </div>
                                <div class="chibi-mouth"></div>
                                <div class="chibi-blush left"></div>
                                <div class="chibi-blush right"></div>
                            </div>
                        </div>
                        <div class="chibi-coat"></div>
                        <div class="chibi-stethoscope"></div>
                        <div class="chibi-tablet"></div>
                    </div>
                </div>
            </div>
            <div id="speech-bubble" class="speech-bubble">
                <p id="bubble-text"></p>
            </div>
        </div>

        <!-- Selectores -->
        <div class="type-selector">
            <button class="type-btn selected" data-type="adulto">🧑 Adulto</button>
            <button class="type-btn" data-type="niño">🧒 Niño</button>
            <button class="type-btn" data-type="bebe">👶 Bebé</button>
        </div>
        <div class="gender-selector">
            <button class="gender-btn active" data-gender="masculino">♂️</button>
            <button class="gender-btn" data-gender="femenino">♀️</button>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button id="start-btn" class="btn btn-start">▶ Iniciar Guía</button>
            <button id="next-btn" class="btn btn-next" disabled style="display:none;">⏭ Siguiente</button>
            <button id="voice-btn" class="btn btn-voice">🔊 Voz: Activada</button>
        </div>

        <!-- Metrónomo -->
        <div id="metronome-box" class="metronome-box" style="display: none;">
            <p>🎵 Ritmo 100‑120/min</p>
            <button id="metro-start" class="metro-btn">▶ Iniciar</button>
            <button id="metro-stop" class="metro-btn" disabled>⏹ Parar</button>
        </div>

        <a href="tel:107" class="btn btn-emergency">📞 Llamar al 107</a>
        <p class="disclaimer">Asistente virtual · No sustituye formación profesional</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
