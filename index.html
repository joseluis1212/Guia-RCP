<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>RCP Companion ✨</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Área del avatar animado -->
        <div class="avatar-area">
            <div id="avatar-container" class="avatar-container">
                <div id="avatar-head" class="avatar-head">
                    <div class="avatar-eyes">
                        <div class="avatar-eye left"><div class="pupil"></div></div>
                        <div class="avatar-eye right"><div class="pupil"></div></div>
                    </div>
                    <div id="avatar-mouth" class="avatar-mouth"></div>
                    <div class="avatar-blush left"></div>
                    <div class="avatar-blush right"></div>
                    <div id="avatar-accessory" class="avatar-accessory"></div>
                </div>
            </div>

            <!-- Globo de diálogo -->
            <div id="speech-bubble" class="speech-bubble">
                <p id="bubble-text"></p>
            </div>
        </div>

        <!-- Selector de tipo de RCP -->
        <div class="type-selector">
            <button class="type-btn" data-type="adulto">
                <img src="adulto.png" alt="Adulto" class="type-img"><span>Adulto</span>
            </button>
            <button class="type-btn selected" data-type="niño">
                <img src="niño.png" alt="Niño" class="type-img"><span>Niño</span>
            </button>
            <button class="type-btn" data-type="bebe">
                <img src="bebe.png" alt="Bebé" class="type-img"><span>Bebé</span>
            </button>
        </div>

        <!-- Controles -->
        <div class="controls">
            <button id="start-btn" class="btn btn-start">▶ Iniciar Guía</button>
            <button id="next-btn" class="btn btn-next" disabled>⏭ Siguiente</button>
            <button id="voice-btn" class="btn btn-voice">🔊 Voz: Activada</button>
        </div>

        <!-- Metrónomo -->
        <div id="metronome-box" class="metronome-box" style="display: none;">
            <p>🎵 Ritmo 100‑120/min</p>
            <button id="metro-start" class="metro-btn">▶ Iniciar</button>
            <button id="metro-stop" class="metro-btn" disabled>⏹ Parar</button>
        </div>

        <!-- Emergencia -->
        <a href="tel:107" class="btn btn-emergency">📞 Llamar al 107</a>

        <p class="disclaimer">Asistente virtual · No sustituye formación profesional</p>
    </div>

    <script src="app.js"></script>
</body>
</html>
